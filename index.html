<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chop Wood &amp; Carry Water – 60 Day Practice</title>
  <style>
    :root{
      --bg:#0e1116;
      --surface:#131821;
      --surface2:#10151d;
      --text:#e7edf6;
      --muted:#aab4c4;
      --line:#253042;
      --acc:#7aa7ff;
      --good:#5fd08a;
      --mid:#e0b45c;
      --rec:#7aa7ff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; padding:16px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color:var(--text);
    }
    .wrap{ max-width:980px; margin:0 auto; display:grid; gap:12px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .card{
      background: var(--surface);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      box-shadow: none;
    }
    h1{ font-size:18px; margin:0 0 6px; letter-spacing:.2px; }
    h2{ font-size:15px; margin:0 0 8px; color:var(--text); }
    p{ margin:0; color:var(--muted); line-height:1.35; font-size:13px; }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-weight:850;
      cursor:pointer;
      transition: transform .04s ease, background .12s ease, border-color .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: rgba(122,167,255,0.45);
      background: rgba(122,167,255,0.10);
    }
    .btn.danger{
      border-color: rgba(255,120,120,0.40);
      background: rgba(255,120,120,0.10);
    }
    .btn.good{
      border-color: rgba(95,208,138,0.40);
      background: rgba(95,208,138,0.10);
    }
    .btn.mid{
      border-color: rgba(224,180,92,0.40);
      background: rgba(224,180,92,0.10);
    }
    .btn.rec{
      border-color: rgba(122,167,255,0.40);
      background: rgba(122,167,255,0.08);
    }
    .btn:disabled{ opacity:.45; cursor:not-allowed; }

    .pill{
      display:inline-flex; gap:6px; align-items:center;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color:var(--muted);
      font-size:12px;
    }
    .pill strong{ color:var(--text); }
    .grid{ display:grid; grid-template-columns: 1fr; gap:12px; }
    @media (min-width: 880px){ .grid{ grid-template-columns: 1fr; } }
    #rightCard{ display:none; }
    .sectionTitle{ font-size:15px; margin:0 0 8px; color:var(--text); }
    .optionalCard{ opacity:.88; }
    .optionalCard .ex-title, .optionalCard .ex-meta{ font-style:italic; }
    .carryCard{ margin-top:0; }

    .hr{ height:1px; background:var(--line); margin:12px 0; }
    .small{ font-size:12px; color:var(--muted); }
    .time{
      font-variant-numeric: tabular-nums;
      font-size:42px; font-weight:900; letter-spacing:.5px; line-height:1;
    }
    .label{ color:var(--muted); font-size:12px; }
    .exercise{
      border:1px solid var(--line);
      background: var(--surface2);
      border-radius:12px;
      padding:10px 12px;
      display:flex; gap:10px; justify-content:space-between; align-items:flex-start;
    }
    .ex-left{ display:grid; gap:3px; }
    .ex-title{ font-weight:850; }
    .ex-meta{ color:var(--muted); font-size:12px; }

    /* Gate */
    .gate-grid{ display:grid; gap:12px; }
    .gate-row{ display:grid; gap:8px; }
    .score-row{ display:flex; gap:8px; flex-wrap:wrap; }
    .score-btn{
      width:44px; height:38px;
      display:inline-flex; justify-content:center; align-items:center;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      font-weight:900;
      cursor:pointer;
      user-select:none;
      transition: transform .04s ease, background .12s ease, border-color .12s ease;
    }
    .score-btn:active{ transform: translateY(1px); }
    .score-btn.active{
      border-color: rgba(255, 157, 46, 0.55);
      background: linear-gradient(180deg, rgba(255, 157, 46, 0.22), rgba(255, 157, 46, 0.10));
    }
    .total{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      border:1px solid var(--line);
      background: var(--surface2);
      border-radius:12px;
      padding:10px 12px;
    }
    .total .n{ font-size:28px; font-weight:900; font-variant-numeric: tabular-nums; }
    .badge{
      padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }
    .badge.good{ color: rgba(55,214,122,1); border-color: rgba(55,214,122,.4); background: rgba(55,214,122,.08); }
    .badge.mid{ color: rgba(255,176,32,1); border-color: rgba(255,176,32,.4); background: rgba(255,176,32,.08); }
    .badge.rec{ color: rgba(83,166,255,1); border-color: rgba(83,166,255,.45); background: rgba(83,166,255,.10); }

    /* Breathing */
    .breathBox{ display:grid; gap:12px; align-items:center; justify-items:center; padding:8px 0; }
    .ring{
      width:220px; height:220px; border-radius:999px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.02);
      display:grid; place-items:center;
      position: relative;
      overflow:hidden;
    }
    .ring::after{
      content:"";
      position:absolute; inset:12px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,0.10);
    }
    .ringInner{
      width:120px; height:120px; border-radius:999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      display:grid; place-items:center;
      transition: transform 0.25s linear;
      z-index:1;
    }
    .phase{ font-weight:950; letter-spacing:.6px; text-align:center; }
    .phaseSub{ font-size:12px; color:var(--muted); margin-top:2px; text-align:center; }
    .progress{ width:100%; height:10px; border-radius:999px; border:1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.25); overflow:hidden; }
    .progress > div{ height:100%; width:0%; background: linear-gradient(90deg, rgba(255,157,46,0.35), rgba(255,157,46,0.10)); }

    /* Confetti canvas */
    #confettiCanvas{ position:fixed; inset:0; pointer-events:none; z-index:9999; display:none; }
  
    .scale-legend{
      font-size:12px;
      color: var(--muted);
      opacity:.85;
      margin-top:6px;
      line-height:1.3;
    }
    
    .score-label{ margin-top:6px; min-height:18px; font-size:12px; color:var(--muted); font-weight:600; }
.score-btn.active{
      transform: scale(1.08);
      font-weight:700;
    }

    /* App modal (confirm + checkpoint) */
    #appModal{
      position:fixed; inset:0;
      background: rgba(0,0,0,0.58);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:10000;
      padding:16px;
    }
    #appModal.show{ display:flex; }
    .modalCard{
      width:min(560px, 100%);
      border:1px solid var(--line);
      background: var(--surface);
      border-radius:16px;
      padding:14px;
      box-shadow: none;
    }
    .modalTitle{ font-size:15px; font-weight:900; margin:0 0 6px; }
    .modalText{ font-size:13px; color:var(--muted); margin:0; line-height:1.35; }
    .modalRow{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .modalList{ display:grid; gap:8px; margin-top:10px; }
    .modalItem{
      border:1px solid var(--line);
      background: rgba(0,0,0,0.18);
      border-radius:12px;
      padding:10px 12px;
      color:var(--text);
      font-size:13px;
    }
    .modalItem label{ display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
    .modalItem input{ transform: translateY(2px); }

</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div id="appModal" aria-hidden="true">
  <div class="modalCard">
    <div class="modalTitle" id="modalTitle">Chop Wood &amp; Carry Water</div>
    <p class="modalText" id="modalText">—</p>
    <div id="modalBody"></div>
    <div class="modalRow" id="modalActions"></div>
  </div>
</div>


<div class="wrap">
  <div class="card">
    <h1>Chop Wood &amp; Carry Water</h1>
    <div class="row" style="margin-top:10px;">
      <button id="btnMain" class="btn primary">Open sessie</button>
      <button id="btnReset" class="btn danger" title="Wist selectie-geheugen + actieve dagstatus.">Reset</button>
      <span id="trainPill" class="pill">Practice: <strong>0 / 60</strong></span>
    </div>
    <p class="small" style="margin-top:10px;"></p>
  </div>

  <div class="grid">
    <div id="leftCard" class="card"></div>
    <div id="rightCard" class="card"><div id="rightInner"></div></div>
  </div>
</div>

<script>
(() => {
  const LS_MEM_KEY = "dtt_memory_v3";
  const LS_ACTIVE_KEY = "dtt_active_v2";
  const LS_DAY_KEY = "dtt_day_v2";
  const LS_TRAIN_COUNT_KEY = "dtt_train_count_v1";
  const LS_FULL_STREAK_KEY = "dtt_full_streak_v1";
  const LS_PULL_MODE_KEY = "dtt_pull_mode_v1";
  const LS_PRACTICE_MODE_KEY = "cw_practice_mode_v1";
  const LS_HYPERTROPHY_QUEUE_KEY = "cw_hypertrophy_queue_v1";

  const DUR = { fullCircuitSec: 20*60, miniCircuitSec: 15*60, carrySec: 5*60, mobilitySec: 25*60 };

  const EVERYTHING_ELSE_NORMAL = [
    "Windmill",
    "Half Kneeling Windmill",
    "Bent Press",
    "Mace 360",
    "Shield Cast",
    "Mace 10-2",
    "Clubbell Side Swing",
    "Clubbell Rotational Pullover to Pendulum",
    "Beast Crawl",
    "Lateral Crawl",
    "Dead Bug",
    "Bird Dog",
    "Side Bend",
    "Hip Airplane"
  ];

  const EVERYTHING_ELSE_SAFE = [
    "Windmill",
    "Half Kneeling Windmill",
    "Bent Press",
    "KB Bicep Curl",
    "Overhead Tricep Extension",
    "Mace Dynamic Switch",
    "Clubbell Side Swing",
    "Clubbell Rotational Pullover to Pendulum",
    "Beast Crawl",
    "Lateral Crawl",
    "Dead Bug",
    "Bird Dog",
    "Side Bend",
    "Hip Airplane"
  ];

  const LIB = {
    squat: { label:"Squat", subcats:{
      symmetric:{ label:"Symmetrisch", exercises:["Goblet Squat","Double Front Squat","Hack Squat"] },
      asymmetric:{ label:"Asymmetrisch", exercises:["Reverse Lunge","Side Lunge / Cossack","Bulgarian Split Squat"] },
      singleleg:{ label:"Single Leg", exercises:["Step-up","Skater Squat","Box Pistol"] },
    }},
    hinge: { label:"Hinge", subcats:{
      deadlift:{ label:"Deadlift", exercises:["Single-Leg Deadlift","B-Stance Deadlift","Double Sumo Deadlift"] },
      hipthrust:{ label:"Hip Thrust", exercises:["Hip Thrust","B-Stance Hip Thrust","Single-Leg Hip Thrust"] },
      ballistic:{ label:"Ballistic", exercises:["One-Arm Swing","Two-Arm Swing","Hand-to-Hand Swing"] },
    }},
    push: { label:"Push", subcats:{
      horizontal:{ label:"Horizontal", exercises:["Bridge Floor Press","Push-up","Get-Up Sit-Up"] },
      vertical:{ label:"Vertical", exercises:["Military Press","Half-Kneeling Press","Top-Down Press"] },
      ballistic:{ label:"Ballistic", exercises:["Double Push Press","Push Jerk","Viking Push Press"] },
    }},
    pull: { label:"Pull", subcats:{
      horizontal:{ label:"Horizontal", exercises:["Wide Row","Small Row","Gorilla Row"] },
      vertical:{ label:"Vertical", exercises:["Chin-up","Pull-up","False-Grip Pull-up"] },
      ballistic:{ label:"Ballistic", exercises:["Double Clean","Snatch","High Pull"] },
    }}
  };

  const CARRIES = ["Suitcase Carry","Front Rack Carry","Overhead Carry","Front Rack March","Cook Drill March","Get-Up"];

  const MOBILITY = [
    { kind:"reps", label:"Levator stretch", value:"5x" },
    { kind:"reps", label:"Deep Lunge Pry", value:"5x" },
    { kind:"reps", label:"Deep Lunge & Reach", value:"5x" },
    { kind:"reps", label:"Pidgeon/Childs pose + Reach", value:"5x" },
    { kind:"reps", label:"Downward Dog + Ankle Pumps", value:"5x" },
    { kind:"reps", label:"Bend knee Stretch (in downward dog)", value:"5x" },
    { kind:"reps", label:"Cirkels and reach in Super Couch (half kneeling)", value:"5x" },
    { kind:"time", label:"Fold over hamstring stretch", value:"15s" },
    { kind:"time", label:"Thoracic Bridge", value:"15s" },
    { kind:"reps", label:"Hip Cirkels", value:"5x" },
  ];

  const leftCard = document.getElementById("leftCard");
  const rightInner = document.getElementById("rightInner");
  const btnMain = document.getElementById("btnMain");
  const btnReset = document.getElementById("btnReset");
  const wakeStatus = document.getElementById("wakeStatus");
  const modePill = document.getElementById("modePill");
  const pullModePill = document.getElementById("pullModePill");

  // --- Date key
  function todayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${da}`;
  }

  // --- Persist helpers
  function loadJSON(k){ try{ const r = localStorage.getItem(k); return r? JSON.parse(r) : null; }catch{ return null; } }
  function saveJSON(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

  function loadPullMode(){
    const mode = localStorage.getItem(LS_PULL_MODE_KEY);
    return mode === "SAFE" ? "SAFE" : "NORMAL";
  }
  function savePullMode(mode){
    localStorage.setItem(LS_PULL_MODE_KEY, mode === "SAFE" ? "SAFE" : "NORMAL");
  }
  function updatePullModePill(){
    const mode = loadPullMode();
    if(pullModePill){
      pullModePill.innerHTML = `Pull: <strong>${mode === "SAFE" ? "Lies vriendelijk" : "Normaal"}</strong>`;
    }
  }
  function getEverythingElsePool(){
    return loadPullMode() === "SAFE" ? EVERYTHING_ELSE_SAFE.slice() : EVERYTHING_ELSE_NORMAL.slice();
  }

  function getPracticeMode(){
    const mode = localStorage.getItem(LS_PRACTICE_MODE_KEY);
    return mode === "progression" ? "progression" : "zen";
  }
  function savePracticeMode(mode){
    localStorage.setItem(LS_PRACTICE_MODE_KEY, mode === "progression" ? "progression" : "zen");
  }
  function getWorkSets(practiceMode, sessionNumber){
    if(practiceMode !== "progression") return 3;
    const n = Math.max(1, Number(sessionNumber) || 1);
    if(n <= 20) return 3;
    if(n <= 40) return 4;
    return 5;
  }
  function formatPrescription(item, sets){
    const reps = item && item.subcatKey === "ballistic" ? 10 : 5;
    return `${sets} × ${reps}`;
  }
  
  const HYPERTROPHY_ORDER = ["push","hinge","pull","squat"];

  function loadHypertrophyState(){
    const saved = loadJSON(LS_HYPERTROPHY_QUEUE_KEY);
    if(saved && saved.current){
      return saved;
    }
    return { current: "push" };
  }

  function saveHypertrophyState(state){
    saveJSON(LS_HYPERTROPHY_QUEUE_KEY, state);
  }

  function advanceHypertrophy(state){
    const idx = HYPERTROPHY_ORDER.indexOf(state.current);
    const next = HYPERTROPHY_ORDER[(idx + 1) % HYPERTROPHY_ORDER.length];
    state.current = next;
    saveHypertrophyState(state);
  }

  function isBallistic(subcatKey){
    return subcatKey === "ballistic";
  }

  function isBallisticExtraExercise(name){
    const ex = String(name || "").toLowerCase();
    return ex.includes("mace") || ex.includes("swing") || ex.includes("cast") || ex.includes("10-2") || ex.includes("pullover") || ex.includes("pendulum");
  }
  function formatExtraPrescription(name){
    return `2 × ${isBallisticExtraExercise(name) ? 10 : 5}`;
  }

  // --- Training session counter (FULL/MINI only)
  function loadTrainCount(){ return loadJSON(LS_TRAIN_COUNT_KEY) || { n: 0, checkpointDone: false }; }
  function saveTrainCount(v){ saveJSON(LS_TRAIN_COUNT_KEY, v); }

  function loadFullStreak(){ return loadJSON(LS_FULL_STREAK_KEY) || { n: 0 }; }
  function saveFullStreak(v){ saveJSON(LS_FULL_STREAK_KEY, v); }

  function updateTrainPill(){
    const tc = loadTrainCount();
    const n = tc.n || 0;
    const el = document.getElementById("trainPill");
    if(!el) return;
    let suffix = "";
    if(n === 30) suffix = " • Halverwege";
    if(n >= 60) suffix = " • Checkpoint";
    el.innerHTML = `Practice: <strong>${n} / 60</strong>${suffix}`;
  }

  function initTrainPillEditor(){
    const el = document.getElementById("trainPill");
    if(!el || el.dataset.longpressBound === "1") return;
    el.dataset.longpressBound = "1";

    let pressTimer = null;
    let longPressTriggered = false;

    const clearPressTimer = () => {
      if(pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
      }
    };

    const openCountEditor = () => {
      longPressTriggered = true;
      const current = (loadTrainCount().n || 0);
      const raw = window.prompt("Set Practice teller (0-999):", String(current));
      if(raw === null) return;
      const parsed = Number(raw);
      if(!Number.isFinite(parsed)) return;
      const next = Math.max(0, Math.min(999, Math.round(parsed)));
      const tc = loadTrainCount();
      tc.n = next;
      saveTrainCount(tc);
      updateTrainPill();
      try{ maybeShowCheckpoint(); }catch{}
    };

    const startPress = () => {
      clearPressTimer();
      longPressTriggered = false;
      pressTimer = setTimeout(openCountEditor, 700);
    };

    const endPress = (e) => {
      if(longPressTriggered && e){
        e.preventDefault();
        e.stopPropagation();
      }
      clearPressTimer();
      setTimeout(() => { longPressTriggered = false; }, 0);
    };

    el.addEventListener("touchstart", startPress, { passive: true });
    el.addEventListener("touchend", endPress);
    el.addEventListener("touchcancel", endPress);
    el.addEventListener("mousedown", startPress);
    el.addEventListener("mouseup", endPress);
    el.addEventListener("mouseleave", endPress);
    el.addEventListener("contextmenu", (e) => e.preventDefault());
  }

  // --- Minimal modal (confirm + checkpoint)
  const appModal = document.getElementById("appModal");
  const modalTitleEl = document.getElementById("modalTitle");
  const modalTextEl = document.getElementById("modalText");
  const modalBodyEl = document.getElementById("modalBody");
  const modalActionsEl = document.getElementById("modalActions");

  function closeModal(){
    if(!appModal) return;
    appModal.classList.remove("show");
    appModal.setAttribute("aria-hidden", "true");
    if(modalBodyEl) modalBodyEl.innerHTML = "";
    if(modalActionsEl) modalActionsEl.innerHTML = "";
  }

  function openModal({title="Chop Wood & Carry Water", text="—", bodyHTML="", actionsHTML=""} = {}){
    if(!appModal) return;
    if(modalTitleEl) modalTitleEl.textContent = title;
    if(modalTextEl) modalTextEl.innerHTML = text;
    if(modalBodyEl) modalBodyEl.innerHTML = bodyHTML || "";
    if(modalActionsEl) modalActionsEl.innerHTML = actionsHTML || "";
    appModal.classList.add("show");
    appModal.setAttribute("aria-hidden", "false");
  }

  if(appModal){
    appModal.addEventListener("click", (e) => { if(e.target === appModal) closeModal(); });
  }

  // --- Checkpoint: bell-up check (after 60 training sessions)
  function showCheckpointModal(){
    const items = [
      {k:"rpe", t:"Gemiddelde RPE < 7 (laatste 2 weken)"},
      {k:"pain", t:"Geen pijntjes / irritatie"},
      {k:"tech", t:"Techniek voelt strak en stabiel"},
      {k:"sleep", t:"Slaap / herstel stabiel"},
      {k:"miss", t:"Laatste 2 weken geen sessies gemist"},
    ];

    const body = `
      <div class="modalList">
        ${items.map(i => `
          <div class="modalItem">
            <label>
              <input type="checkbox" data-ck="${i.k}">
              <span>${i.t}</span>
            </label>
          </div>
        `).join("")}
      </div>
      <p class="modalText" style="margin-top:10px;">
        Score <b>4–5</b>: je <b>mag</b> een bell omhoog. Score <b>0–3</b>: blijf nog even bij dezelfde bell.
      </p>
      <p class="modalText" id="cpResult" style="margin-top:10px;"></p>
    `;

    const actions = `
      <button id="btnCpScore" class="btn primary">Check score</button>
      <button id="btnCpLater" class="btn">Later</button>
    `;

    openModal({
      title: "Checkpoint (60 sessies)",
      text: "Je hebt 60 practice-sessies gedaan. Tijd voor een korte check.",
      bodyHTML: body,
      actionsHTML: actions
    });

    document.getElementById("btnCpLater").addEventListener("click", () => {
      const tc = loadTrainCount();
      tc.checkpointDone = true; // don't keep nudging
      saveTrainCount(tc);
      updateTrainPill();
      closeModal();
    });

    document.getElementById("btnCpScore").addEventListener("click", () => {
      const cks = Array.from(document.querySelectorAll('input[type="checkbox"][data-ck]'));
      const score = cks.reduce((a,el)=>a + (el.checked?1:0), 0);
      const res = document.getElementById("cpResult");
      if(res) res.innerHTML = `Score: <b>${score} / 5</b>.`;

      const makeResetActions = (canGoUp) => `
        <button id="btnCpUp" class="btn good" ${canGoUp?"" :"disabled"}>Omhoog (reset teller)</button>
        <button id="btnCpAgain" class="btn primary">Nog 60 (reset teller)</button>
        <button id="btnCpClose" class="btn">Sluiten</button>
      `;

      if(modalActionsEl){
        modalActionsEl.innerHTML = makeResetActions(score >= 4);
      }

      const markDone = () => {
        const tc = loadTrainCount();
        tc.checkpointDone = true;
        saveTrainCount(tc);
        updateTrainPill();
      };

      const doReset = () => {
        saveTrainCount({ n: 0, checkpointDone: true });
        updateTrainPill();
        // reset streak as well (fresh start)
        saveFullStreak({ n: 0 });
      };

      const btnUp = document.getElementById("btnCpUp");
      if(btnUp){
        btnUp.addEventListener("click", () => {
          if(score < 4) return;
          doReset();
          closeModal();
          boot();
        });
      }

      document.getElementById("btnCpAgain").addEventListener("click", () => {
        doReset();
        closeModal();
        boot();
      });

      document.getElementById("btnCpClose").addEventListener("click", () => {
        markDone();
        closeModal();
      });
    });
  }

  function maybeShowCheckpoint(){

  async function requestWakeLock(){

  // -------------------------
  // Beep
  // -------------------------
  function beep(times=3){
    try{
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const now = ctx.currentTime;
      for(let i=0;i<times;i++){
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 1200; // lower freq cuts through noise better
        gain.gain.setValueAtTime(0.0001, now + i*0.18);
        gain.gain.exponentialRampToValueAtTime(0.6, now + i*0.18 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i*0.18 + 0.35);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + i*0.18); 
        osc.stop(now + i*0.18 + 0.35);
      }
      setTimeout(() => ctx.close(), 900);
    }catch{}
  }

  function makeTimer(totalSeconds, onTick){
    return {
      total: totalSeconds,
      left: totalSeconds,
      running: false,
      _t: null,
      start(onDone){
        if(this.running) return;
        this.running = true;
        const tick = () => {
          if(!this.running) return;
          const f = this._onTick || onTick; f && f(this.left, this.total);
          if(this.left <= 0){
            this.running=false; this._t=null;
            try{ onDone && onDone(); }catch{}
            return;
          }
          this._t = setTimeout(() => { this.left -= 1; tick(); }, 1000);
        };
        tick();
      },
      pause(){ this.running=false; if(this._t) clearTimeout(this._t); this._t=null; },
      reset(){ this.pause(); this.left=this.total; { const f = this._onTick || onTick; f && f(this.left,this.total); } },
      setTotal(totalSeconds){ this.pause(); this.total=totalSeconds; this.left=totalSeconds; { const f = this._onTick || onTick; f && f(this.left,this.total); } },
    };
  }

  function refillSubcategoryBag(patternKey, mem){
    const subcats = Object.keys(LIB[patternKey].subcats);
    const last = mem.patterns[patternKey].lastSubcat;
    let bag = shuffle(subcats);

    if(last && bag.length > 1 && bag[0] === last){
      const swapIdx = bag.findIndex(sc => sc !== last);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    mem.patterns[patternKey].subcatBag = bag;
  }

  function pickSubcategory(patternKey, mem){
    const patternMem = mem.patterns[patternKey];
    const subcats = Object.keys(LIB[patternKey].subcats);
    if(!patternMem.subcatBag || !patternMem.subcatBag.length){
      refillSubcategoryBag(patternKey, mem);
    }

    let bag = patternMem.subcatBag;
    const last = patternMem.lastSubcat;

    if(!bag.length){
      refillSubcategoryBag(patternKey, mem);
      bag = patternMem.subcatBag;
    }

    if(last && bag.length > 1 && bag[0] === last){
      const swapIdx = bag.findIndex(sc => sc !== last);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    let picked = bag.shift();

    if(last && picked === last){
      const fallback = subcats.find(sc => sc !== last);
      if(fallback){
        picked = fallback;
        const idx = bag.indexOf(fallback);
        if(idx >= 0) bag.splice(idx, 1);
      }
    }

    patternMem.subcatBag = bag;
    return picked;
  }

  const confCanvas = document.getElementById('confettiCanvas');
  const confCtx = confCanvas.getContext('2d');
  function confettiBurst(ms=1400){
    const w = confCanvas.width = window.innerWidth;
    const h = confCanvas.height = window.innerHeight;
    confCanvas.style.display = 'block';
    const pieces = Array.from({length: 160}, () => ({
      x: Math.random()*w,
      y: -20 - Math.random()*h*0.2,
      vx: (Math.random()*2-1)*6,
      vy: 3 + Math.random()*8,
      s: 4 + Math.random()*6,
      r: Math.random()*Math.PI*2,
      vr: (Math.random()*2-1)*0.2,
      a: 1,
    }));
    const start = performance.now();
    const draw = (t) => {
      const elapsed = t - start;
      confCtx.clearRect(0,0,w,h);
      for(const p of pieces){
        p.x += p.vx;
        p.y += p.vy;
        p.r += p.vr;
        p.vy *= 0.99;
        p.vx *= 0.995;
        if(elapsed > ms*0.6) p.a = Math.max(0, 1 - (elapsed - ms*0.6) / (ms*0.4));
        confCtx.save();
        confCtx.globalAlpha = p.a;
        confCtx.translate(p.x,p.y);
        confCtx.rotate(p.r);
        // no fixed colors: use varying grayscale + accent tint
        const shade = 180 + Math.floor(Math.random()*60);
        confCtx.fillStyle = `rgba(${shade},${shade},${shade},${p.a})`;
        confCtx.fillRect(-p.s/2, -p.s/2, p.s, p.s*0.6);
        confCtx.restore();
      }
      if(elapsed < ms){ requestAnimationFrame(draw); }
      else { confCtx.clearRect(0,0,w,h); confCanvas.style.display='none'; }
    };
    requestAnimationFrame(draw);
  }

          <div class="ex-meta" style="font-style:italic; line-height:1.5;">${lesson}</div>
        </div>
      </div>

      <h3 class="sectionTitle">Main Training</h3>
      <div id="sessionList" style="display:grid; gap:10px;"></div>

      ${mode === 'FULL' && session.optional ? `
      <div class="hr"></div>
      <h3 class="sectionTitle">Optioneel</h3>
      <div class="exercise optionalCard">
        <div class="ex-left">
          <div class="ex-title">${session.optional}</div>
          <div class="ex-meta">${formatExtraPrescription(session.optional)}</div>
        </div>
        <div class="pill">Optional</div>
      </div>` : ``}

      <div class="hr"></div>
      <h3 class="sectionTitle">Loaded Carry</h3>
      <div class="exercise carryCard" style="align-items:center;">
        <div class="ex-left">
          <div class="ex-title">${session.carry}</div>
          <div class="ex-meta">05:00 rustig • wissel zijde wanneer nodig</div>
        </div>
        <div class="pill">5 min</div>
      </div>

      <div class="hr"></div>
      <div class="row">
        <button id="btnFinish" class="btn danger">Finish session</button>
      </div>
    `;

    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    session.circuit.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'exercise';
      div.innerHTML = `
        <div class="ex-left">
          <div class="ex-title">${item.exercise}</div>
          <div class="ex-meta">${item.patternLabel} • ${item.subcatLabel} • <b>${item.hypertrophy 
      ? `${getWorkSets(practiceMode, sessionNumber)} × 8–12 (-1 bell)` 
      : formatPrescription(item, workSets)
    }</b></div>
        </div>
        <div class="pill">${item.patternLabel}</div>
      `;
      list.appendChild(div);
    });

    renderRightNone();
    setModePill(mode);

    document.getElementById('btnFinish').addEventListener('click', () => {
      completeSession();
    });

    releaseWakeLock();
  }

  // -------------------------
  // Mobility screen
  // -------------------------
  function renderMobility(active){
    leftCard.innerHTML = `
      <h2>Vandaag</h2>
      <div class="small">Volg de routine in volgorde. Vink af wat je gedaan hebt.</div>
      <div style="display:grid; gap:10px; margin-top:10px;" id="mobList"></div>
      <div class="hr"></div>
      <div class="row" style="gap:10px;">
        <button id="btnAddWalk" class="btn rec">Add walk</button>
        <button id="btnAddBreath" class="btn primary">Add breathing</button>
        <button id="btnFinish" class="btn danger">Finish session</button>
      </div>
      <p class="small" style="margin-top:10px;">Wandelen: geen wakelock • Breathing: wel wakelock.</p>
    `;

    const mobList = document.getElementById('mobList');
    mobList.innerHTML = '';
    const checks = active.mobilityChecks || {};
    MOBILITY.forEach((m, i) => {
      const id = `m${i}`;
      const div = document.createElement('div');
      div.className = 'exercise';
      const checked = !!checks[id];
      div.innerHTML = `
        <div class="ex-left">
          <div class="ex-title">${m.value} ${m.label}</div>
          <div class="ex-meta">${m.kind === 'time' ? 'tijd' : 'reps'}</div>
        </div>
        <div class="pill" style="cursor:pointer; user-select:none;" data-check="${id}">${checked ? '✓' : '○'}</div>
      `;
      mobList.appendChild(div);
    });

    mobList.addEventListener('click', (e) => {
      const t = e.target;
      if(!t.classList.contains('pill')) return;
      const id = t.getAttribute('data-check');
      if(!id) return;
      const a = loadActive();
      if(!a) return;
      a.mobilityChecks = a.mobilityChecks || {};
      a.mobilityChecks[id] = !a.mobilityChecks[id];
      saveActive(a);
      t.textContent = a.mobilityChecks[id] ? '✓' : '○';
    });

    // mobility timer (no wakelock)
    timers.mobility = makeTimer(DUR.mobilitySec, (left,total) => {
      const a = loadActive();
      if(!a) return;
      a.timers = a.timers || {};
      a.timers.mobilityLeft = left;
      saveActive(a);
    });
    timers.mobility.left = Math.max(0, active.timers?.mobilityLeft ?? DUR.mobilitySec);

    renderRightTimer('Mobility (25:00)', 'mobility');
    setModePill('RECOVERY');
    releaseWakeLock();

    document.getElementById('btnAddWalk').addEventListener('click', () => renderWalkPicker());
    document.getElementById('btnAddBreath').addEventListener('click', () => renderBreathPicker());
    document.getElementById('btnFinish').addEventListener('click', () => completeSession());
  }

  // -------------------------
  // Walk
  // -------------------------
  function renderWalkPicker(){
    leftCard.innerHTML = `
      <h2>Wandelen</h2>
      <p class="small">Kies duur (geen wakelock).</p>
      <div class="row" style="margin-top:10px;">
        <button class="btn rec" data-w="600">10 min</button>
        <button class="btn rec" data-w="1200">20 min</button>
        <button class="btn rec" data-w="1800">30 min</button>
      </div>
      <div class="hr"></div>
      <div class="row">
        <button id="btnBack" class="btn">Terug</button>
      </div>
    `;
    leftCard.querySelectorAll('button[data-w]').forEach(b => {
      b.addEventListener('click', () => {
        const sec = Number(b.getAttribute('data-w'));
        const a = loadActive() || { day: todayKey(), mode:'RECOVERY', phase:'WALK', timers:{} };
        a.phase = 'WALK';
        a.timers = a.timers || {};
        a.timers.walkLeft = sec;
        saveActive(a);
        boot();
      });
    });
    document.getElementById('btnBack').addEventListener('click', () => boot());
    renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

    setModePill('WALK');
  }

  function renderWalk(active){
    leftCard.innerHTML = `
      <h2>Wandelen</h2>
      <p class="small">Je hoeft het scherm niet aan te houden.</p>
      <div class="hr"></div>
      <div class="row">
        <button id="btnBack" class="btn">Terug</button>
        <button id="btnFinish" class="btn danger">Finish session</button>
      </div>
    `;

    timers.walk = makeTimer(active.timers.walkLeft ?? 600, (left,total) => {
      const a = loadActive();
      if(!a) return;
      a.timers.walkLeft = left;
      saveActive(a);
    });
    timers.walk.left = Math.max(0, active.timers.walkLeft ?? 600);
    renderRightTimer('Walk', 'walk');
    setModePill('WALK');
    releaseWakeLock();

    document.getElementById('btnBack').addEventListener('click', () => { active.phase = 'MOBILITY'; saveActive(active); boot(); });
    document.getElementById('btnFinish').addEventListener('click', () => completeSession());
  }

  // -------------------------
  // Breathing
  // -------------------------
  function renderBreathPicker(){
    leftCard.innerHTML = `
      <h2>Breathing (3-1-6-2)</h2>
      <p class="small">Kies duur (wakelock aan tijdens timer).</p>
      <div class="row" style="margin-top:10px;">
        <button class="btn primary" data-b="300">5 min</button>
        <button class="btn primary" data-b="600">10 min</button>
      </div>
      <div class="hr"></div>
      <div class="row">
        <button id="btnBack" class="btn">Terug</button>
      </div>
    `;
    leftCard.querySelectorAll('button[data-b]').forEach(b => {
      b.addEventListener('click', () => {
        const sec = Number(b.getAttribute('data-b'));
        const a = loadActive() || { day: todayKey(), mode:'RECOVERY', phase:'BREATHING', timers:{} };
        a.phase = 'BREATHING';
        a.timers = a.timers || {};
        a.timers.breathLeft = sec;
        a.timers.breathPhase = 'IN';
        a.timers.breathPhaseLeft = 3;
        saveActive(a);
        boot();
      });
    });
    document.getElementById('btnBack').addEventListener('click', () => boot());
    renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

    setModePill('BREATHING');
  }

  const breathSeq = [
    { phase:'IN', sec:3, scale:1.20 },
    { phase:'HOLD', sec:1, scale:1.20 },
    { phase:'OUT', sec:6, scale:0.80 },
    { phase:'HOLD', sec:2, scale:0.80 },
  ];

  function renderBreathing(active){
    leftCard.innerHTML = `
      <h2>Breathing (3-1-6-2)</h2>
      <div class="breathBox">
        <div class="ring">
          <div class="ringInner" id="ringInner">
            <div>
              <div class="phase" id="phaseTxt">IN</div>
              <div class="phaseSub" id="phaseSub">3s</div>
            </div>
          </div>
        </div>
        <div class="progress"><div id="prog"></div></div>
        <div class="small" id="totalLeft">—</div>
      </div>
      <div class="hr"></div>
      <div class="row">
        <button id="btnBack" class="btn">Terug</button>
        <button id="btnFinish" class="btn danger">Finish session</button>
      </div>
    `;

    const ringInner = document.getElementById('ringInner');
    const phaseTxt = document.getElementById('phaseTxt');
    const phaseSub = document.getElementById('phaseSub');
    const prog = document.getElementById('prog');
    const totalLeft = document.getElementById('totalLeft');

    function setPhase(p){
      phaseTxt.textContent = p.phase;
      ringInner.style.transform = `scale(${p.scale})`;
    }

    // Initialize from active
    const total = active.timers.breathTotal ?? (active.timers.breathTotal = (active.timers.breathLeft ?? 300));

    function updateUI(){
      const a = loadActive();
      if(!a) return;
      const left = a.timers.breathLeft;
      const pct = total ? (1 - left/total) * 100 : 0;
      prog.style.width = `${Math.max(0, Math.min(100, pct))}%`;
      totalLeft.textContent = `Nog ${fmt(left)}`;
      phaseTxt.textContent = a.timers.breathPhase;
      phaseSub.textContent = `${a.timers.breathPhaseLeft}s`;
      const p = breathSeq.find(x => x.phase === a.timers.breathPhase && ((x.phase==='IN'||x.phase==='OUT') ? true : true)) || breathSeq[0];
      ringInner.style.transform = `scale(${p.scale})`;
    }

    // Breathing timer is custom (phase-based)
    if(timers.breathing) timers.breathing.pause();

    timers.breathing = makeTimer(active.timers.breathLeft ?? 300, (left, totalIgnored) => {
      const a = loadActive();
      if(!a) return;
      a.timers.breathLeft = left;
      saveActive(a);
      updateUI();
    });
    timers.breathing.left = Math.max(0, active.timers.breathLeft ?? 300);

    // phase tick
    let phaseTicker = null;
    function stopPhaseTicker(){ if(phaseTicker) clearInterval(phaseTicker); phaseTicker=null; }

    function startPhaseTicker(){
      stopPhaseTicker();
      phaseTicker = setInterval(() => {
        const a = loadActive();
        if(!a) return;
        if(!timers.breathing.running) return;
        a.timers.breathPhaseLeft = Math.max(0, (a.timers.breathPhaseLeft ?? 0) - 1);
        if(a.timers.breathPhaseLeft <= 0){
          // move to next phase
          const idx = breathSeq.findIndex(x => x.phase === a.timers.breathPhase && x.sec === (a.timers.breathPhaseSec || x.sec));
          const next = breathSeq[(idx+1) % breathSeq.length];
          a.timers.breathPhase = next.phase;
          a.timers.breathPhaseLeft = next.sec;
          a.timers.breathPhaseSec = next.sec;
          saveActive(a);
          // optional: beep at phase change (kept on)
          beep(1);
        } else {
          saveActive(a);
        }
        updateUI();
      }, 1000);
    }

    // Right panel for breathing uses timers.breathing (start/pause/reset), but with wakelock
    renderRightTimer('Breathing', 'breathing');
    setModePill('BREATHING');

    // Patch the right panel buttons to also control phaseTicker + wakelock
    const startBtn = rightInner.querySelector('#btnStart');
    const pauseBtn = rightInner.querySelector('#btnPause');
    const resetBtn = rightInner.querySelector('#btnResetT');

    startBtn.addEventListener('click', () => {
      requestWakeLock();
      const a = loadActive();
      if(!a) return;
      // if no phase init
      if(!a.timers.breathPhase){ a.timers.breathPhase = 'IN'; a.timers.breathPhaseLeft = 3; }
      saveActive(a);
      startPhaseTicker();
    }, { once:false });

    pauseBtn.addEventListener('click', () => {
      // pause already handled by renderRightTimer; also stop ticker
      stopPhaseTicker();
      releaseWakeLock();
    }, { once:false });

    resetBtn.addEventListener('click', () => {
      const a = loadActive();
      if(!a) return;
      stopPhaseTicker();
      a.timers.breathLeft = a.timers.breathTotal ?? (a.timers.breathTotal = (a.timers.breathLeft ?? 300));
      a.timers.breathPhase = 'IN';
      a.timers.breathPhaseLeft = 3;
      a.timers.breathPhaseSec = 3;
      saveActive(a);
      timers.breathing.reset();
      releaseWakeLock();
      updateUI();
    }, { once:false });

    // bootstrap phase visuals
    const a0 = loadActive();
    if(a0 && !a0.timers.breathPhase){
      a0.timers.breathPhase = 'IN';
      a0.timers.breathPhaseLeft = 3;
      a0.timers.breathPhaseSec = 3;
      saveActive(a0);
    }
    updateUI();

    document.getElementById('btnBack').addEventListener('click', () => {
      stopPhaseTicker();
      releaseWakeLock();
      const a = loadActive();
      if(a){ a.phase = 'MOBILITY'; saveActive(a); }
      boot();
    });
    document.getElementById('btnFinish').addEventListener('click', () => {
      stopPhaseTicker();
      releaseWakeLock();
      completeSession();
    });

    // ensure no wakelock until user starts
    releaseWakeLock();
  }

  // -------------------------
  // Persistence helpers for right timer (generic)
  // -------------------------
  function persistActive(){
    // timers already persist via onTick, this is a no-op helper now
  }

  // -------------------------
  // Session completion
  // -------------------------
  function completeSession(){
    const a = loadActive();
    // summary line for completion screen
    let summaryLine = "Top. Morgen weer een nieuwe gate.";

    if(a && (a.mode === 'FULL' || a.mode === 'MINI') && a.session && a.session.memNext){
    }

    // If today's session was not FULL/MINI training, break FULL streak
    if(a && !(a.mode === 'FULL' || a.mode === 'MINI')){
      const fs = loadFullStreak();
      fs.n = 0;
      saveFullStreak(fs);
      summaryLine = "Recovery sessie voltooid.";
    }

    clearActive();
    // keep day state locked until tomorrow OR user resets; this matches your idea
    // (If you want unlock on finish, uncomment next line)
    // localStorage.removeItem(LS_DAY_KEY);

    // Stop timers and wakelock
    Object.values(timers).forEach(t => { try{ t && t.pause && t.pause(); }catch{} });
    releaseWakeLock();

    confettiBurst();
    btnMain.textContent = 'Open sessie';
    btnMain.classList.add('primary');
    setModePill('—');
    // Show summary screen
    leftCard.innerHTML = `
      <h2>Session complete ✅</h2>
      <p class="small">${summaryLine}</p>
      <div class="hr"></div>
      <button id="btnHome" class="btn primary">Terug naar start</button>
    `;
    document.getElementById('btnHome').addEventListener('click', () => {
      // allow new start same day only if you reset; otherwise show locked state
      boot();
    });
    renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

  }

  // -------------------------
  // Boot / Router
  // -------------------------
  function boot(){
    updateTrainPill();
    updatePullModePill();
    initTrainPillEditor();
    bindStartLongPress();
    
    const day = loadDayState();
    const active = loadActive();

    if(active){
      btnMain.textContent = 'Open sessie';
      // route by phase
      if(active.phase === 'TRAINING') return renderTraining(active);
      if(active.phase === 'MOBILITY')  return renderMobility(active);
      if(active.phase === 'WALK')      return renderWalk(active);
      if(active.phase === 'BREATHING') return renderBreathing(active);
    }

    // if day gate is filled but no active session (user decided not to train)
    if(day && day.modeLocked){
      btnMain.textContent = 'Open sessie';
      leftCard.innerHTML = `
        <h2>Gate ingevuld (${day.total}/15)</h2>
        <p class="small">Je hebt vandaag al een gate gezet. Je kunt je sessie openen of resetten.</p>
        <div class="hr"></div>
        <div class="row">
          <button id="btnStartFromLock" class="btn primary">Open sessie</button>
          <button id="btnResetDay" class="btn danger">Reset vandaag</button>
        </div>
      `;
      renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

      setModePill(day.modeLocked);

      document.getElementById('btnStartFromLock').addEventListener('click', () => {
        // create active based on locked mode
        const mode = day.modeLocked;
        if(mode === 'FULL' || mode === 'MINI'){
          const s = generateSession(mode);
          // save memory and count immediately on generation
          saveMemory(s.memNext);
          const tc = loadTrainCount();
          tc.n = (tc.n || 0) + 1;
          saveTrainCount(tc);
          updateTrainPill();
          saveActive({ day: todayKey(), mode, phase:'TRAINING', session:s, practiceMode:getPracticeMode(), sessionNumber:(tc.n || 1), timers:{
            circuitLeft: (mode==='FULL'?DUR.fullCircuitSec:DUR.miniCircuitSec),
            carryLeft: DUR.carrySec,
          }});
        } else {
          saveActive({ day: todayKey(), mode, phase:'MOBILITY', timers:{ mobilityLeft: DUR.mobilitySec }, mobilityChecks: {} });
        }
        boot();
      });

      document.getElementById('btnResetDay').addEventListener('click', () => {
        localStorage.removeItem(LS_DAY_KEY);
        clearActive();
        boot();
      });
      return;
    }

    // default: gate
    btnMain.textContent = 'Open sessie';
    renderGate(null);
  }

  function openPracticeModeSelector(){
    const current = getPracticeMode();
    openModal({
      title: "Practice mode",
      text: "Kies je practice. Zen blijft altijd op 3×5. Progression bouwt op van 3×5 naar 5×5 over 60 sessies.",
      actionsHTML: `
        <button id="btnModeZen" class="btn primary"${current === "zen" ? ' disabled' : ''}>Zen</button>
        <button id="btnModeProgression" class="btn good"${current === "progression" ? ' disabled' : ''}>Progression</button>
        <button id="btnModeCancel" class="btn">Sluiten</button>
      `
    });

    document.getElementById("btnModeZen").addEventListener("click", () => {
      savePracticeMode("zen");
      closeModal();
      boot();
    });

    document.getElementById("btnModeProgression").addEventListener("click", () => {
      savePracticeMode("progression");
      closeModal();
      boot();
    });

    document.getElementById("btnModeCancel").addEventListener("click", () => closeModal());
  }

  let suppressStartClickUntil = 0;

  function bindStartLongPress(){
    if(btnMain.dataset.longpressBound === "1") return;
    btnMain.dataset.longpressBound = "1";

    let pressTimer = null;
    let pointerIsDown = false;

    const clearPress = () => {
      if(pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
      }
    };

    const startPress = (e) => {
      clearPress();
      pointerIsDown = true;
      pressTimer = setTimeout(() => {
        if(!pointerIsDown) return;
        suppressStartClickUntil = Date.now() + 1200;
        try{ e && e.preventDefault && e.preventDefault(); }catch{}
        openPracticeModeSelector();
      }, 700);
    };

    const endPress = (e) => {
      pointerIsDown = false;
      clearPress();
      if(Date.now() < suppressStartClickUntil && e){
        e.preventDefault();
        e.stopPropagation();
      }
    };

    if(window.PointerEvent){
      btnMain.addEventListener("pointerdown", startPress);
      btnMain.addEventListener("pointerup", endPress);
      btnMain.addEventListener("pointercancel", endPress);
      // Do not cancel on tiny pointer drift; that made long-press unreliable.
    } else {
      btnMain.addEventListener("touchstart", startPress, { passive: false });
      btnMain.addEventListener("touchend", endPress);
      btnMain.addEventListener("touchcancel", endPress);
      btnMain.addEventListener("mousedown", startPress);
      btnMain.addEventListener("mouseup", endPress);
      // Do not cancel on mouseleave for the same reason.
    }

    btnMain.addEventListener("contextmenu", (e) => e.preventDefault());
  }

  // -------------------------
  // Main button
  // -------------------------
  btnMain.addEventListener('click', (e) => {
    if(Date.now() < suppressStartClickUntil){
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if(appModal && appModal.classList.contains("show")) return;
    const active = loadActive();
    const day = loadDayState();
    if(active){
      boot();
      return;
    }
    if(day && day.modeLocked){
      boot();
      return;
    }
    renderGate(null);
  });

  // Reset button (confirm)
  btnReset.addEventListener('click', () => {
    openModal({
      title: "Program reset",
      text: "Dit wist: selectie-geheugen, actieve sessie, gate van vandaag, én je Practice teller.",
      bodyHTML: "",
      actionsHTML: `
        <button id="btnDoReset" class="btn danger">Reset</button>
        <button id="btnCancelReset" class="btn">Annuleer</button>
      `
    });

    document.getElementById("btnCancelReset").addEventListener("click", () => closeModal());

    // 2-tap safety
    const btn = document.getElementById("btnDoReset");
    let armed = false;
    btn.textContent = "Tik nogmaals om te bevestigen";
    btn.classList.remove("danger");
    btn.classList.add("mid");

    btn.addEventListener("click", () => {
      if(!armed){
        armed = true;
        btn.textContent = "Bevestig reset";
        btn.classList.remove("mid");
        btn.classList.add("danger");
        return;
      }
      localStorage.removeItem(LS_MEM_KEY);
      localStorage.removeItem(LS_ACTIVE_KEY);
      localStorage.removeItem(LS_DAY_KEY);
      localStorage.removeItem(LS_TRAIN_COUNT_KEY);
      localStorage.removeItem(LS_FULL_STREAK_KEY);
      Object.values(timers).forEach(t => { try{ t && t.pause && t.pause(); }catch{} });
      releaseWakeLock();
      closeModal();
      boot();
    });
  });

  // Visibility: re-request wakelock only if a wakelock-eligible timer is running
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState !== 'visible') return;
    // Only if circuit/carry/breathing running
    const eligibleRunning = (timers.circuit && timers.circuit.running) || (timers.carry && timers.carry.running) || (timers.breathing && timers.breathing.running);
    if(eligibleRunning) requestWakeLock();
  });

  // First boot
  setWakeStatus(false);
  renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

  boot();
})();
</script>
